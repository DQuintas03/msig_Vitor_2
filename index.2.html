
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#root{background:#080d06;border-radius:12px;overflow:hidden;font-family:'Barlow Condensed',sans-serif;padding:1.5rem}
h2.titulo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:0.02em}
p.subtitulo{font-size:11px;color:rgba(255,255,255,0.35);text-align:center;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1.5rem}
.selectors{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.sel-wrap{display:flex;flex-direction:column;gap:6px}
.sel-label{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase}
.sel-label.a{color:#8B9D5E}
.sel-label.b{color:#C4A45A}
select{background:#0f1a0c;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:13px;padding:8px 10px;width:100%;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
select:focus{border-color:rgba(255,255,255,0.3)}
.chart-wrap{display:flex;align-items:center;justify-content:center;position:relative}
canvas#radar{display:block}
.legend{display:flex;justify-content:center;gap:2rem;margin-top:1rem}
.leg{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,0.55);letter-spacing:0.06em}
.leg-dot{width:10px;height:10px;border-radius:50%}
.scores{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1.2rem}
.score-card{background:#0f1a0c;border-radius:8px;padding:12px 14px;border:1px solid rgba(255,255,255,0.07)}
.sc-name{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px}
.sc-name.a{color:#8B9D5E}
.sc-name.b{color:#C4A45A}
.sc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sc-dim{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.04em}
.sc-val{font-size:11px;font-weight:700;color:rgba(255,255,255,0.75)}
.sc-bar-wrap{width:60px;height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.sc-bar{height:100%;border-radius:2px;transition:width 0.4s ease}
</style>

<div id="root">
  <h2 class="titulo">Perfil Multidimensional dos Campos</h2>
  <p class="subtitulo">Seleciona dois campos para comparação directa</p>

  <div class="selectors">
    <div class="sel-wrap">
      <div class="sel-label a">Campo A</div>
      <select id="selA"></select>
    </div>
    <div class="sel-wrap">
      <div class="sel-label b">Campo B</div>
      <select id="selB"></select>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="radar" width="340" height="300"></canvas>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#8B9D5E"></div><span id="legA">Campo A</span></div>
    <div class="leg"><div class="leg-dot" style="background:#C4A45A"></div><span id="legB">Campo B</span></div>
  </div>

  <div class="scores">
    <div class="score-card" id="cardA"></div>
    <div class="score-card" id="cardB"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
var DIMS=['Acess. Viária','Mob. Reduzida','Conservação','Atractividade','Freq. Utilização'];
var MAX=[4,3,4,5,4];

var CAMPOS=[
  {nome:"Estádio Municipal de Braga",     v:[4,2,4,5,4]},
  {nome:"Parque da Rodovia",              v:[3,2,3,4,3]},
  {nome:"Estádio 1.º de Maio",            v:[4,2,4,3,3]},
  {nome:"Complexo Desportivo das Camélias",v:[3,1,2,2,2]},
  {nome:"Complexo Pol. Padim da Graça",   v:[2,1,2,2,3]},
  {nome:"Est. João Soares Vieira (Merelinense)",v:[3,2,3,3,3]},
  {nome:"Campo de Jogos de Real",         v:[3,1,2,2,2]},
  {nome:"Campo de Jogos Maximinos",       v:[3,1,3,3,3]},
  {nome:"Campo de Jogos Parque da Ponte", v:[3,2,3,3,3]},
  {nome:"Campo do Dume (Celestino Lobo)", v:[2,1,2,2,2]},
  {nome:"Campo de Jogos de Palmeira",     v:[2,1,2,2,2]},
  {nome:"Campo de Merelim (São Pedro)",   v:[3,1,2,2,2]},
  {nome:"Campo de Jogos de Sobreposta",   v:[1,1,1,1,1]},
  {nome:"Campo de Jogos de Nogueira",     v:[2,1,2,2,2]},
  {nome:"Campo de Jogos de Fraião",       v:[3,2,3,3,3]},
  {nome:"Campo de Jogos de Lamaçães",     v:[3,2,3,3,2]},
  {nome:"Campo de Jogos de Padim da Graça",v:[2,1,2,1,2]}
];

var DIM_LABELS_FULL=['Acessibilidade Viária','Mobilidade Reduzida','Estado de Conservação','Potencial de Atractividade','Frequência de Utilização'];

function populate(sel, excludeIdx){
  sel.innerHTML='';
  CAMPOS.forEach(function(c,i){
    if(i===excludeIdx)return;
    var o=document.createElement('option');
    o.value=i;
    o.textContent=c.nome;
    sel.appendChild(o);
  });
}

var selA=document.getElementById('selA');
var selB=document.getElementById('selB');
populate(selA,-1);
populate(selB,-1);
selB.selectedIndex=1;

var ctx=document.getElementById('radar').getContext('2d');
var chart=new Chart(ctx,{
  type:'radar',
  data:{
    labels:DIMS,
    datasets:[
      {label:'A',data:[],backgroundColor:'rgba(139,157,94,0.15)',borderColor:'#8B9D5E',borderWidth:2,pointBackgroundColor:'#8B9D5E',pointRadius:4},
      {label:'B',data:[],backgroundColor:'rgba(196,164,90,0.15)',borderColor:'#C4A45A',borderWidth:2,pointBackgroundColor:'#C4A45A',pointRadius:4}
    ]
  },
  options:{
    responsive:false,
    scales:{r:{
      min:0,
      ticks:{display:false,stepSize:1},
      grid:{color:'rgba(255,255,255,0.08)'},
      angleLines:{color:'rgba(255,255,255,0.08)'},
      pointLabels:{color:'rgba(255,255,255,0.55)',font:{family:'Barlow Condensed',size:11}}
    }},
    plugins:{legend:{display:false},tooltip:{
      backgroundColor:'rgba(8,13,6,0.95)',
      titleColor:'#fff',bodyColor:'rgba(255,255,255,0.7)',
      borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
      titleFont:{family:'Barlow Condensed',size:12},
      bodyFont:{family:'Barlow Condensed',size:11}
    }}
  }
});

function normalise(v,max){return v/max}

function renderCard(id,campo,cls){
  var card=document.getElementById(id);
  var html='<div class="sc-name '+cls+'">'+campo.nome+'</div>';
  DIM_LABELS_FULL.forEach(function(d,i){
    var pct=Math.round(normalise(campo.v[i],MAX[i])*100);
    html+='<div class="sc-row"><span class="sc-dim">'+d+'</span><div style="display:flex;align-items:center;gap:6px"><div class="sc-bar-wrap"><div class="sc-bar" style="width:'+pct+'%;background:'+(cls==='a'?'#8B9D5E':'#C4A45A')+'"></div></div><span class="sc-val">'+campo.v[i]+'/'+MAX[i]+'</span></div></div>';
  });
  card.innerHTML=html;
}

function update(){
  var iA=parseInt(selA.value);
  var iB=parseInt(selB.value);
  var cA=CAMPOS[iA];
  var cB=CAMPOS[iB];
  chart.data.datasets[0].data=cA.v.map(function(v,i){return normalise(v,MAX[i])*MAX[i]>0?v:0});
  chart.data.datasets[0].label=cA.nome;
  chart.data.datasets[1].data=cB.v;
  chart.data.datasets[1].label=cB.nome;
  chart.update();
  document.getElementById('legA').textContent=cA.nome;
  document.getElementById('legB').textContent=cB.nome;
  renderCard('cardA',cA,'a');
  renderCard('cardB',cB,'b');
}

selA.addEventListener('change',update);
selB.addEventListener('change',update);
update();
</script>
